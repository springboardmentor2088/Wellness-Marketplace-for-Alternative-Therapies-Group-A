#spring.application.name=wellness-backend

# ============ MySQL Database Configuration (XAMPP) ============
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============ SQL Initialization ============
# Changed to 'never' to prevent table wipes and data loss.
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:db/schema.sql
# spring.jpa.defer-datasource-initialization=true
# spring.sql.init.continue-on-error=true

server.port=8081

# ============ Redis Cache Configuration ============
spring.cache.type=simple
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ============ Gmail SMTP Configuration ============
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Replace with your Gmail address and App Password (NOT your regular Gmail password)
# To generate an App Password: Google Account → Security → 2-Step Verification → App Passwords
spring.mail.username=wellnessmarketplacefor@gmail.com
spring.mail.password=wraa tmvn qwxo wfrx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============ App Configuration ============
app.name=Wellness Application
app.support.email=
app.login.url=http://localhost:5173/login
app.ngrok.url=

# ============ Session Reminder Scheduler Configuration ============
# Enable/disable automated session reminders
app.session.reminder.enabled=true

# Interval (in minutes) before session to send reminder
# Default: 30 minutes
app.session.reminder.interval-minutes=30

# Enable/disable 1-hour reminder (optional enhancement)
# If true, sends additional reminder 1 hour before session
app.session.reminder.one-hour-enabled=true

# ============ Multipart File Upload Configuration ============
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

